name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q

  docker-sandbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: docker pull ubuntu:22.04
      - run: echo "SANDBOX_USER=$(id -u):$(id -g)" >> "$GITHUB_ENV"
      - run: RUN_DOCKER_TESTS=1 python -m pytest tests/test_docker_integration.py -q
